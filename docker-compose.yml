services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=mysql+pymysql://root:password@db:3306/app_db
      - APP_ENV=development
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: app_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5