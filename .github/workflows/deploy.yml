name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  # ---------------------------------------------
  # TEST (Quality Gate)
  # ---------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Lint with flake8
        run: flake8 app/ tests/
      
      - name: Run tests
        run: python -m pytest tests/ -v

  # ---------------------------------------------
  # BUILD & PUSH TO ECR
  # ---------------------------------------------
  build-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build-image.outputs.image_uri }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "us-east-1"
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/secure-app-repo:$IMAGE_TAG
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ---------------------------------------------
  # DEPLOY VIA AWS SSM
  # ---------------------------------------------
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "us-east-1"
      
      - name: Deploy to EC2 via AWS SSM
        env:
          IMAGE_URI: ${{ needs.build-push.outputs.image_uri }}
        run: |
          COMMANDS=$(jq -n \
            --arg img "$IMAGE_URI" \
            '[
              "set -a; source /home/ec2-user/.env; set +a; ECR_REGISTRY=\($img | split("/")[0]); aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ECR_REGISTRY; docker rm -f secure-app-container || true; docker pull \($img); docker run -d --name secure-app-container -p 8080:8080 --restart always -e DATABASE_URL=$DATABASE_URL \($img)"
            ]')
          
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=$COMMANDS" \
            --timeout-seconds 120 > /dev/null 2>&1
          
          echo "Waiting 60 seconds for deployment to propagate..."
          sleep 60
          
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.ALB_DNS_NAME }}/health)
            if [ "$STATUS" == "200" ]; then
              echo "Deployment Successful!"
              exit 0
            fi
            echo "Waiting for application to start... ($i/10)"
            sleep 10
          done
          
          echo "Deployment Failed: Health check did not pass."
          exit 1